name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lint Markdown
        run: ./scripts/check-markdown.sh

  lean:
    name: Lean build and proof checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: true

      - name: Build and check proofs
        run: ./scripts/check.sh

  emulator:
    name: Deterministic QEMU smoke test
    needs:
      - repository-hygiene
      - lean
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: true

      - name: Install image and emulator tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc=4:13.2.0-7ubuntu1 \
            binutils=2.42-4ubuntu2.10 \
            grub-common=2.12-1ubuntu7.3 \
            grub-pc-bin=2.12-1ubuntu7.3 \
            mtools=4.0.43-1build1 \
            xorriso=1:1.5.6-1.1ubuntu3 \
            qemu-system-x86=1:8.2.2+ds-0ubuntu1.17 \
            coreutils=9.4-3ubuntu6.2

      - name: Record tool versions
        run: ./scripts/record-tool-versions.sh

      - name: Verify image-build failures propagate
        run: ./scripts/test-build-image.sh

      - name: Build and boot image
        run: |
          mkdir -p build/ci
          ./scripts/build-image.sh 2>&1 | tee build/ci/image-build.log
          ./scripts/run-image.sh 2>&1 | tee build/ci/qemu-smoke.log

      - name: Preserve reproducibility artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: leanos-boot-${{ github.sha }}
          path: |
            build/boot/leanos-0.1.0-x86_64.iso
            build/boot/leanos.elf
            build/boot/leanos.map
            build/boot/SHA256SUMS
            build/boot/serial.log
            build/boot/corpus.tsv
            build/oracle/host-results.txt
            build/ci/*.log
            build/ci/tool-versions.txt
          if-no-files-found: warn
          retention-days: 14
