name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lint Markdown
        run: ./scripts/check-markdown.sh

  lean:
    name: Lean build and proof checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pinned Lean toolchain
        uses: ./.github/actions/setup-lean

      - name: Build and check proofs
        run: ./scripts/check.sh

  emulator:
    name: Deterministic QEMU smoke test
    needs:
      - repository-hygiene
      - lean
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pinned Lean toolchain
        uses: ./.github/actions/setup-lean

      - name: Install image and emulator tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc=4:13.2.0-7ubuntu1 \
            binutils=2.42-4ubuntu2.10 \
            grub-common=2.12-1ubuntu7.3 \
            grub-pc-bin=2.12-1ubuntu7.3 \
            mtools=4.0.43-1build1 \
            xorriso=1:1.5.6-1.1ubuntu3 \
            qemu-system-x86=1:8.2.2+ds-0ubuntu1.17 \
            coreutils=9.4-3ubuntu6.2

      - name: Record tool versions
        run: ./scripts/record-tool-versions.sh

      - name: Verify image-build failures propagate
        run: ./scripts/test-build-image.sh

      - name: Build and boot image
        run: |
          set -o pipefail
          mkdir -p build/ci
          ./scripts/build-image.sh 2>&1 | tee build/ci/image-build.log
          ./scripts/run-emulator-evidence.py run \
            2>&1 | tee build/ci/emulator-evidence.log

      - name: Preserve reproducibility artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: leanos-boot-${{ github.sha }}
          path: |
            build/boot/leanos-0.1.0-x86_64.iso
            build/boot/leanos-0.1.0-x86_64-preemption.iso
            build/boot/leanos-0.1.0-x86_64-extended-state.iso
            build/boot/leanos-0.1.0-x86_64-extended-state-mmx.iso
            build/boot/leanos-0.1.0-x86_64-extended-state-sse.iso
            build/boot/leanos-0.1.0-x86_64-extended-state-sse2.iso
            build/boot/leanos-0.1.0-x86_64-extended-state-avx.iso
            build/boot/leanos-0.1.0-x86_64-extended-state-peer-pke.iso
            build/boot/leanos-0.1.0-x86_64-double-fault.iso
            build/boot/leanos-0.1.0-x86_64-entry-stack-overflow.iso
            build/boot/leanos-0.1.0-x86_64-entry-adversarial.iso
            build/boot/leanos.elf
            build/boot/leanos-preemption.elf
            build/boot/leanos-extended-state.elf
            build/boot/leanos-extended-state-mmx.elf
            build/boot/leanos-extended-state-sse.elf
            build/boot/leanos-extended-state-sse2.elf
            build/boot/leanos-extended-state-avx.elf
            build/boot/leanos-extended-state-peer-pke.elf
            build/boot/leanos-double-fault.elf
            build/boot/leanos-entry-stack-overflow.elf
            build/boot/leanos-entry-stack-overflow.map
            build/boot/leanos-entry-adversarial.elf
            build/boot/leanos.map
            build/boot/leanos-preemption.map
            build/boot/leanos-extended-state.map
            build/boot/leanos-extended-state-mmx.map
            build/boot/leanos-extended-state-sse.map
            build/boot/leanos-extended-state-sse2.map
            build/boot/leanos-extended-state-avx.map
            build/boot/leanos-extended-state-peer-pke.map
            build/boot/leanos-double-fault.map
            build/boot/leanos-prelink.map
            build/boot/boot-page-plan.h
            build/boot/boot-page-plan.final.h
            build/boot/boot-page-plan-preemption.h
            build/boot/boot-page-plan-preemption.final.h
            build/boot/boot-page-plan-extended-state.h
            build/boot/boot-page-plan-extended-state.final.h
            build/boot/boot-page-plan-extended-state-mmx.final.h
            build/boot/boot-page-plan-extended-state-sse.final.h
            build/boot/boot-page-plan-extended-state-sse2.final.h
            build/boot/boot-page-plan-extended-state-avx.final.h
            build/boot/boot-page-plan-extended-state-peer-pke.final.h
            build/boot/SHA256SUMS
            build/boot/serial.log
            build/boot/preemption.serial.log
            build/boot/extended-state.serial.log
            build/boot/extended-state-mmx.serial.log
            build/boot/extended-state-sse.serial.log
            build/boot/extended-state-sse2.serial.log
            build/boot/extended-state-avx.serial.log
            build/boot/extended-state-peer-pke.serial.log
            build/boot/double-fault.serial.log
